# Configurazione di Kippo
# Copiare questo file come kippo.cfg nella root di installazione di Kippo:
#   cp kippo.cfg.dist kippo.cfg
# Riferimento: https://github.com/desaster/kippo

[honeypot]

# Porta di ascolto SSH
# Usare una porta non privilegiata e redirigere con iptables
ssh_port = 2222

# Hostname emulato
hostname = svr01

# Directory del log delle sessioni TTY
log_path = log

# Directory dove i download vengono salvati
download_path = dl

# Timeout di inattivita in secondi
interactive_timeout = 180

# Numero massimo di tentativi di autenticazione per sessione
auth_attempts = 3

[users]

# Credenziali accettate: definite in userdb.txt
# Il formato e lo stesso di Cowrie per compatibilita
userdb = data/userdb.txt

[database_mysql]

# Logging opzionale su database MySQL
# Decommentare e configurare per abilitarlo
# host = localhost
# database = kippo
# username = kippo
# password = CAMBIARE_QUESTA_PASSWORD
# port = 3306
