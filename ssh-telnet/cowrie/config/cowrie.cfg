# Configurazione personalizzata di Cowrie
# Questo file sovrascrive i valori di default presenti in cowrie.cfg.dist
# Riferimento completo: https://cowrie.readthedocs.io/en/latest/INSTALL.html

[honeypot]

# Hostname emulato visibile nella shell
hostname = svr04

# Directory del filesystem virtuale
contents_path = honeyfs

# Cartella dove vengono salvati i file scaricati dagli attaccanti
download_path = ${honeypot:state_path}/downloads

# Log delle sessioni TTY
ttylog = true
ttylog_path = ${honeypot:state_path}/tty

# Interazione: l'attaccante puo navigare il filesystem
# e eseguire comandi nella shell emulata
interactive_timeout = 180

# Numero massimo di tentativi di autenticazione prima di chiudere la connessione
auth_max_tries = 6

[ssh]

# Porta di ascolto SSH (usare iptables per redirigere la 22 qui)
listen_endpoints = tcp:2222:interface=0.0.0.0

# Versione SSH emulata
version = SSH-2.0-OpenSSH_6.0p1 Debian-4+deb7u2

enabled = true

[telnet]

# Porta di ascolto Telnet (usare iptables per redirigere la 23 qui)
listen_endpoints = tcp:2223:interface=0.0.0.0

enabled = true

[output_jsonlog]

# Log in formato JSON, utile per l'analisi automatica
enabled = true
logfile = ${honeypot:log_path}/cowrie.json

[output_textlog]

# Log in formato testo leggibile
enabled = true
logfile = ${honeypot:log_path}/cowrie.log
