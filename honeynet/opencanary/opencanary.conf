{
    "device.node_id": "opencanary-1",
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/log/opencanary/opencanary.log",
                    "formatter": "plain"
                }
            }
        }
    },
    "ftp.enabled": true,
    "ftp.port": 2121,
    "ftp.banner": "FTP server ready.",
    
    "http.enabled": true,
    "http.port": 8080,
    "http.banner": "Apache/2.4.41 (Ubuntu)",
    
    "ssh.enabled": true,
    "ssh.port": 2222,
    "ssh.version": "SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.1",
    
    "telnet.enabled": true,
    "telnet.port": 2323,
    "telnet.banner": "Ubuntu 20.04 LTS"
}
